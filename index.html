<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 1</title>
</head>
<body>
    <h1>Javascript Conditional Statementss</h1>

    <input type="text" class="form-control" id="agee" placeholder="input here">
    <button class="btn btn-info" onclick="checkAge()">Check</button>

    <script>
        function checkAge(){
        var agee = document.getElementById('agee').value
        if(isNaN(agee)|| agee < 0){
            alert("Put valid nunber instead");
        }
        else if(agee<18){
            alert("You are a minorr.");
        }
        else if(agee>18){
            alert("You are a legal age now");
        }
        else{
            alert("Age could not be checked omd");
        }
    }
    </script>
</body>
</html>
